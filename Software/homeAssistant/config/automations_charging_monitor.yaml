# Automation: EV Charging Monitor MQTT Sync
# Description:
# This automation monitors the state of the smart charging switch and other relevant attributes related to EV charging
# in Home Assistant. It publishes the current state and relevant data to an MQTT topic that an ESP32 device can subscribe to.
# The automation is designed to publish a full JSON payload on certain triggers (like Home Assistant start, MQTT online status, 
# or changes to the runtime ID) and partial updates when specific attributes change (Highest price in a 3 hour window with the 
# lowest price, charging start time, smart charging activation, or electricity price limit).
# The MQTT topic structure is defined as: <mqtt_prefix>/<runtime_id>/set, where mqtt_prefix and runtime_id are configurable 
# via input_text entities in Home Assistant.
# Note: Ensure that the MQTT broker is properly configured in Home Assistant and that the ESP32 device is subscribed to the 
# correct topic to receive the updates.
# Configuration:
# The following input_text entities should be defined in Home Assistant for this automation to work:
# - input_text.ev_charging_monitor_mqtt_prefix: (manual configuration required) A string to define the MQTT topic prefix. 
#   It is defined in the EV Charging firmware configuration and should match the prefix used by the ESP32 device when it 
#   publishes its online status. 
#   firmware configuration and should match the prefix used by the ESP32 device when it publishes its online status. 
#   This allows the automation to correctly identify and interact with the ESP32 device.
# - input_text.ev_charging_monitor_runtime_id: (automatically updated) A string to hold the runtime ID of the EV charging monitor, 
#   which is captured from the MQTT topic when the ESP32 device comes online.

# Remove the first # from the following lines and add them to your configuration.yaml 

## Global variable for charger ID used in automations_charging_monitor.yaml
#input_text:
#  ev_charging_monitor_mqtt_prefix:
#    name: EV Charging Monitor MQTT Prefix
#    initial: ev-e-charging
#    pattern: "^[A-Za-z0-9_-]+$"
#    max: 64
#
#  ev_charging_monitor_runtime_id:
#    name: EV Charging Monitor Runtime ID
#    pattern: "^[A-Za-z0-9_-]+$"
#    max: 64
#
##Automations for EV Charging Monitor
#automation EvChargingMonitor: !include automations_charging_monitor.yaml


- id: ev_globals_holder
  alias: EV Globals Holder
  initial_state: false
  trigger: []
  variables: &ev_globals
    charging_monitor_mqtt_prefix: "{{ states('input_text.ev_charging_monitor_mqtt_prefix') }}"
    charging_monitor_id: "{{ states('input_text.ev_charging_monitor_runtime_id') }}"
  action: []

- id: ev_capture_monitor_id_from_mqtt
  alias: EV Capture Monitor ID from MQTT
  trigger:
    - platform: mqtt
      topic: "+/+/online"
  condition:
    - condition: template
      value_template: >
        {% set configured_prefix = states('input_text.ev_charging_monitor_mqtt_prefix') %}
        {{ trigger.topic.split('/') | length == 3 and
           (configured_prefix in ['unknown', 'unavailable', '', none] or
            trigger.topic.split('/')[0] == configured_prefix) and
           (trigger.payload | string | lower) in ['true', 'online', '1', 'on'] }}
  action:
    - service: input_text.set_value
      target:
        entity_id: input_text.ev_charging_monitor_runtime_id
      data:
        value: "{{ trigger.topic.split('/')[1] }}"

- id: ev_charging_data_publish
  alias: Publish EV charging data to ESP32
  mode: restart

  variables:
    <<: *ev_globals

    max_price: >
      {% set raw = (state_attr('sensor.nordpool_kwh_dk1_dkk_3_10_025','raw_today') or [])
                  + (state_attr('sensor.nordpool_kwh_dk1_dkk_3_10_025','raw_tomorrow') or []) %}
      {% set now_ts = now().timestamp() %}
      {% set ns_prices = namespace(values=[]) %}

      {% for item in raw if item.end is defined and item.value is defined %}
        {% if as_timestamp(item.end, 0) >= now_ts %}
          {% set ns_prices.values = ns_prices.values + [item.value | float(0)] %}
        {% endif %}
      {% endfor %}

      {% if ns_prices.values | length >= 12 %}
        {% set block = 12 %}
        {% set ns_window = namespace(min_total=999999, index=0) %}

        {% for i in range(0, ns_prices.values|length - block + 1) %}
          {% set total = ns_prices.values[i:i+block] | sum %}
          {% if total < ns_window.min_total %}
            {% set ns_window.min_total = total %}
            {% set ns_window.index = i %}
          {% endif %}
        {% endfor %}

        {{ ns_prices.values[ns_window.index:ns_window.index+block] | max | round(3) }}
      {% else %}
        0
      {% endif %}

  trigger:

    # FULL publish triggers
    - platform: homeassistant
      event: start
      id: full

    - platform: mqtt
      topic: "+/+/online"
      id: full

    - platform: state
      entity_id: input_text.ev_charging_monitor_runtime_id
      id: full


    # PARTIAL publish triggers

    - platform: state
      entity_id: sensor.ev_smart_charging_charging
      attribute: current_price
      id: price

    - platform: state
      entity_id: sensor.ev_smart_charging_charging
      attribute: Charging start time
      id: start

    - platform: state
      entity_id: switch.ev_smart_charging_smart_charging_activated
      id: smart

    - platform: state
      entity_id: number.ev_smart_charging_electricity_price_limit
      id: epricelimit

    - platform: state
      entity_id: sensor.nordpool_kwh_dk1_dkk_3_10_025
      id: maxprice

  action:

    - choose:


        #################################
        # FULL JSON
        #################################

        - conditions:
            - condition: trigger
              id: full
            - condition: template
              value_template: >
                {{ trigger.platform != 'mqtt' or
                   (trigger.topic.split('/') | length == 3 and
                    (trigger.payload | string | lower) in ['true', 'online', '1', 'on']) }}

          sequence:

            - variables:
                charging_monitor_id_live: >
                  {% if trigger.platform == 'mqtt' and trigger.topic is defined and (trigger.topic.split('/') | length == 3) %}
                    {{ trigger.topic.split('/')[1] }}
                  {% else %}
                    {{ states('input_text.ev_charging_monitor_runtime_id') }}
                  {% endif %}
                charging_monitor_mqtt_prefix_live: >
                  {% if trigger.platform == 'mqtt' and trigger.topic is defined and (trigger.topic.split('/') | length == 3) %}
                    {{ trigger.topic.split('/')[0] }}
                  {% else %}
                    {{ states('input_text.ev_charging_monitor_mqtt_prefix') }}
                  {% endif %}

            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ trigger.platform != 'mqtt' }}"
                  sequence:
                    - wait_template: >
                        {{ states('input_text.ev_charging_monitor_runtime_id') not in ['unknown', 'unavailable', '', none] }}
                      timeout: "00:02:00"
                      continue_on_timeout: true

                    - wait_template: >
                        {{ states('input_text.ev_charging_monitor_mqtt_prefix') not in ['unknown', 'unavailable', '', none] }}
                      timeout: "00:02:00"
                      continue_on_timeout: true

                    - variables:
                        charging_monitor_id_live: "{{ states('input_text.ev_charging_monitor_runtime_id') }}"
                        charging_monitor_mqtt_prefix_live: "{{ states('input_text.ev_charging_monitor_mqtt_prefix') }}"

            - condition: template
              value_template: >
                {{ charging_monitor_id_live not in ['unknown', 'unavailable', '', none]
                   and charging_monitor_mqtt_prefix_live not in ['unknown', 'unavailable', '', none] }}

            - wait_template: >
                {{ state_attr('sensor.ev_smart_charging_charging', 'current_price')
                   not in [none, 'unknown', 'unavailable'] }}
              timeout: "00:02:00"
              continue_on_timeout: true

            - service: mqtt.publish
              data:
                topic: "{{ charging_monitor_mqtt_prefix_live }}/{{ charging_monitor_id_live }}/set"
                retain: true
                payload: >
                  {% set start = state_attr('sensor.ev_smart_charging_charging', 'Charging start time') %}
                  {{ {
                    "smartChg": is_state('switch.ev_smart_charging_smart_charging_activated','on'),
                    "chgStartTime": as_timestamp(start) | timestamp_custom('%H:%M') if start else '',
                    "currEPrice": state_attr('sensor.ev_smart_charging_charging','current_price') | float(0),
                    "ePriceLimit": states('number.ev_smart_charging_electricity_price_limit') | float(0),
                    "maxEPrice": max_price | float(0)
                  } | tojson }}


        #################################
        # PARTIAL PRICE
        #################################

        - conditions:
            - condition: trigger
              id: price
            - condition: template
              value_template: "{{ charging_monitor_id not in ['unknown', 'unavailable', '', none] }}"

          sequence:

            - service: mqtt.publish
              data:
                topic: "{{ charging_monitor_mqtt_prefix }}/{{ charging_monitor_id }}/set"
                retain: true
                payload: >
                  {% set price = state_attr('sensor.ev_smart_charging_charging', 'current_price') %}
                  {{ {"currEPrice": price | float(0)} | tojson }}



        #################################
        # PARTIAL START TIME
        #################################

        - conditions:
            - condition: trigger
              id: start
            - condition: template
              value_template: "{{ charging_monitor_id not in ['unknown', 'unavailable', '', none] }}"

          sequence:

            - service: mqtt.publish
              data:
                topic: "{{ charging_monitor_mqtt_prefix }}/{{ charging_monitor_id }}/set"
                retain: true
                payload: >
                  {% set start = state_attr('sensor.ev_smart_charging_charging', 'Charging start time') %}
                  {{ {"chgStartTime": as_timestamp(start) | timestamp_custom('%H:%M') if start else ''} | tojson }}



        #################################
        # PARTIAL SMART SWITCH
        #################################

        - conditions:
            - condition: trigger
              id: smart
            - condition: template
              value_template: "{{ charging_monitor_id not in ['unknown', 'unavailable', '', none] }}"

          sequence:

            - service: mqtt.publish
              data:
                topic: "{{ charging_monitor_mqtt_prefix }}/{{ charging_monitor_id }}/set"
                retain: true
                payload: >
                  {{ {"smartChg": is_state('switch.ev_smart_charging_smart_charging_activated','on')} | tojson }}



        #################################
        # PARTIAL EPRICE LIMIT
        #################################

        - conditions:
            - condition: trigger
              id: epricelimit
            - condition: template
              value_template: "{{ charging_monitor_id not in ['unknown', 'unavailable', '', none] }}"

          sequence:

            - service: mqtt.publish
              data:
                topic: "{{ charging_monitor_mqtt_prefix }}/{{ charging_monitor_id }}/set"
                retain: true
                payload: >
                  {% set e_price_limit = states('number.ev_smart_charging_electricity_price_limit') %}
                  {{ {"ePriceLimit": e_price_limit | float(0)} | tojson }}

        #################################
        # PARTIAL MAX PRICE
        #################################

        - conditions:
            - condition: trigger
              id: maxprice
            - condition: template
              value_template: "{{ charging_monitor_id not in ['unknown', 'unavailable', '', none] }}"

          sequence:

            - service: mqtt.publish
              data:
                topic: "{{ charging_monitor_mqtt_prefix }}/{{ charging_monitor_id }}/set"
                retain: true
                payload: >
                  {{ {"maxEPrice": max_price | float(0)} | tojson }}

- id: ev_charging_mqtt_commands
  alias: EV Charging MQTT Commands
  description: >
    Handle incoming MQTT commands from the ESP32 device to control charging and settings.
    MQTT Topic: homeassistant/<charging_monitor_id>/<charging_monitor_mqtt_prefix>/button
    Supported payloads:
    - {"ev_charging":"start"} - Press manually start charging button
    - {"ev_charging":"stop"} - Press manually stop charging button
    - {"smart_charging_activated":"on"} - Enable smart charging
    - {"smart_charging_activated":"off"} - Disable smart charging
    - {"price_limit":n.nnn} - Set electricity price limit

  variables:
    <<: *ev_globals

  trigger:
    - platform: mqtt
      topic: "homeassistant/+/+/button"
      id: mqtt_command

  condition:
    - condition: template
      value_template: >
        {% set topic_parts = trigger.topic.split('/') %}
        {% set topic_charger_id = topic_parts[1] %}
        {% set topic_prefix = topic_parts[2] %}
        {{ topic_charger_id == charging_monitor_id and
           topic_prefix == charging_monitor_mqtt_prefix and
           charging_monitor_id not in ['unknown', 'unavailable', '', none] and
           charging_monitor_mqtt_prefix not in ['unknown', 'unavailable', '', none] }}

  action:
    - variables:
        payload_data: "{{ trigger.payload | from_json(default={}) }}"

    - choose:

        #################################
        # EV CHARGING - START
        #################################

        - conditions:
            - condition: template
              value_template: "{{ payload_data.get('ev_charging') == 'start' }}"

          sequence:
            - service: button.press
              target:
                entity_id: button.ev_smart_charging_manually_start_charging

        #################################
        # EV CHARGING - STOP
        #################################

        - conditions:
            - condition: template
              value_template: "{{ payload_data.get('ev_charging') == 'stop' }}"

          sequence:
            - service: button.press
              target:
                entity_id: button.ev_smart_charging_manually_stop_charging

        #################################
        # SMART CHARGING - ON
        #################################

        - conditions:
            - condition: template
              value_template: "{{ payload_data.get('smart_charging_activated') == 'on' }}"

          sequence:
            - service: switch.turn_on
              target:
                entity_id: switch.ev_smart_charging_smart_charging_activated

        #################################
        # SMART CHARGING - OFF
        #################################

        - conditions:
            - condition: template
              value_template: "{{ payload_data.get('smart_charging_activated') == 'off' }}"

          sequence:
            - service: switch.turn_off
              target:
                entity_id: switch.ev_smart_charging_smart_charging_activated

        #################################
        # PRICE LIMIT
        #################################

        - conditions:
            - condition: template
              value_template: "{{ payload_data.get('price_limit') is not none }}"

          sequence:
            - service: number.set_value
              target:
                entity_id: number.ev_smart_charging_electricity_price_limit
              data:
                value: "{{ payload_data.get('price_limit') | float(0) }}"

